<!DOCTYPE html>
<html>
<head>
<title>Messenger Bot Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    text-align:center;
}

.container{
    background:white;
    color:black;
    width:90%;
    max-width:400px;
    margin:40px auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

h1{
    margin-top:20px;
}

input, textarea{
    width:95%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

textarea{
    height:90px;
    resize:none;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
}

.save{
    background:#6a5acd;
    color:white;
}

.start{
    background:#28a745;
    color:white;
}

.stop{
    background:#dc3545;
    color:white;
}

.status{
    margin-top:10px;
    font-size:16px;
}

.log-box{
    background:black;
    color:lime;
    height:200px;
    overflow:auto;
    margin-top:15px;
    padding:10px;
    border-radius:10px;
    text-align:left;
    font-family:monospace;
    font-size:12px;
}
</style>

</head>

<body>

<h1>🚀 Messenger Bot Panel</h1>

<div class="container">

<form method="POST">

<textarea name="cookies" placeholder="Paste Cookies JSON here"></textarea>

<input type="text" name="admin_uid" placeholder="Admin UID">

<input type="text" name="group_id" placeholder="Group ID">

<input type="text" name="group_name" placeholder="Group Name">

<button class="save">💾 Save Config</button>

</form>

<hr>

<button class="start" onclick="startBot()">▶ Start</button>
<button class="stop" onclick="stopBot()">⏹ Stop</button>

<div class="status">
Status: {{ "🟢 Running" if status else "🔴 Stopped" }}
</div>

<div id="logs" class="log-box"></div>

</div>

<script>
function startBot(){
    fetch("/start")
}

function stopBot(){
    fetch("/stop")
}

function loadLogs(){
    fetch("/logs")
    .then(res => res.json())
    .then(data => {
        let box = document.getElementById("logs");
        box.innerHTML = data.join("<br>");
        box.scrollTop = box.scrollHeight;
    });
}

setInterval(loadLogs, 2000);
</script>

</body>
</html>
