<!DOCTYPE html>
<html>
<head>
<title>Bot Dashboard</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#1e1e2f,#3a3a7a);
    color:white;
    text-align:center;
}

.card {
    display:inline-block;
    background:#222;
    padding:20px;
    margin:10px;
    border-radius:15px;
    width:150px;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
}

.start {background:green;}
.stop {background:red;}

.log-box {
    background:black;
    color:lime;
    height:200px;
    overflow:auto;
    margin-top:20px;
    padding:10px;
}
</style>

</head>
<body>

<h1>🔥 Bot Dashboard</h1>

<!-- Cards -->
<div class="card">📩<br><span id="msg">0</span><br>Messages</div>
<div class="card">⚙️<br><span id="cmd">0</span><br>Commands</div>
<div class="card">⏱<br><span id="uptime">0</span><br>Uptime</div>

<h3>Status: {{ "🟢 Running" if status else "🔴 Stopped" }}</h3>
<h3>Session: {{ session }}</h3>

<!-- Controls -->
<form method="POST">
<button name="action" value="start" class="start">Start</button>
<button name="action" value="stop" class="stop">Stop</button>
</form>

<!-- Config -->
<h3>Config</h3>
<form method="POST">
<textarea name="cookies" placeholder="Cookies JSON"></textarea><br>
<input name="admin_uid" placeholder="Admin UID"><br>
<input name="bot_uid" placeholder="Bot UID"><br>
<button name="action" value="save">Save</button>
</form>

<!-- Logs -->
<h3>Logs</h3>
<div id="logs" class="log-box"></div>

<script>
// Logs
setInterval(()=>{
fetch("/logs")
.then(r=>r.json())
.then(d=>{
document.getElementById("logs").innerHTML=d.join("<br>")
})
},2000)

// Stats
setInterval(()=>{
fetch("/stats")
.then(r=>r.json())
.then(d=>{
document.getElementById("msg").innerText=d.messages
document.getElementById("cmd").innerText=d.commands
document.getElementById("uptime").innerText=d.uptime+"s"
})
},2000)
</script>

</body>
</html>
