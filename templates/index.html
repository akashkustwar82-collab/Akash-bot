<!DOCTYPE html>
<html>
<head>
<title>Automation Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    text-align:center;
}

.container{
    background:white;
    color:black;
    margin:30px auto;
    padding:20px;
    width:90%;
    max-width:400px;
    border-radius:15px;
}

input, textarea{
    width:95%;
    padding:10px;
    margin:8px;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
}

.start{background:green;color:white;}
.stop{background:red;color:white;}
.save{background:#6a5acd;color:white;}

.logs{
    background:black;
    color:lime;
    height:200px;
    overflow:auto;
    margin-top:10px;
    padding:10px;
}
</style>

</head>

<body>

<h1>🚀 Automation Panel</h1>

<div class="container">

<form method="POST">
<textarea name="cookies" placeholder="Paste Cookies JSON"></textarea>

<input name="admin_uid" placeholder="Admin UID">
<input name="group_id" placeholder="Group ID">
<input name="group_name" placeholder="Group Name">

<button class="save">Save</button>
</form>

<button class="start" onclick="startBot()">Start</button>
<button class="stop" onclick="stopBot()">Stop</button>

<h3>Status: {{ "Running" if status else "Stopped" }}</h3>
<h4>{{ session }}</h4>

<div id="logs" class="logs"></div>

</div>

<script>
function startBot(){ fetch("/start") }
function stopBot(){ fetch("/stop") }

setInterval(()=>{
fetch("/logs")
.then(r=>r.json())
.then(d=>{
document.getElementById("logs").innerHTML=d.join("<br>")
})
},2000)
</script>

</body>
</html>
