<!DOCTYPE html>
<html>
<head>
<title>AKASH DON B0T HOSTING</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    text-align:center;
}

.box{
    background:white;
    color:black;
    margin:40px auto;
    padding:20px;
    width:90%;
    border-radius:15px;
}

input,textarea{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    padding:12px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#667eea,#764ba2);
    color:white;
}

.log{
    background:black;
    color:lime;
    height:200px;
    overflow:auto;
    margin-top:20px;
    padding:10px;
}
</style>

</head>

<body>

<h1>🚀 Facebook Automation Panel</h1>

<div class="box">

<h3>Group Name & Nickname Monitor</h3>

<form method="POST">
<textarea name="cookies" placeholder="Paste cookies JSON"></textarea>
<input name="group_id" placeholder="Group ID">
<input name="group_name" placeholder="Desired Group Name">
<button>Save Config</button>
</form>

<br>

<button onclick="startBot()">Start</button>
<button onclick="stopBot()">Stop</button>

<h4>Status: {{ "🟢 Running" if status else "🔴 Stopped" }}</h4>
<h4>{{ session }}</h4>

<div id="logs" class="log"></div>

</div>

<script>
function startBot(){
    fetch("/start")
}

function stopBot(){
    fetch("/stop")
}

setInterval(()=>{
fetch("/logs")
.then(r=>r.json())
.then(d=>{
document.getElementById("logs").innerHTML=d.join("<br>")
})
},2000)
</script>

</body>
</html>
