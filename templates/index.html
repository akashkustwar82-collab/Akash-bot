<!DOCTYPE html>
<html>
<head>
    <title>SHIVR9J KI DIDI K4 XHUD4I B0T</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #ff00cc, #3333ff);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            padding: 20px;
        }

        button {
            padding: 15px 25px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .start {
            background: #00c853;
            color: white;
        }

        .stop {
            background: #d50000;
            color: white;
        }

        .status {
            margin-top: 10px;
            font-size: 20px;
        }

        .log-box {
            background: black;
            color: lime;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 10px;
            text-align: left;
            font-family: monospace;
            margin-top: 20px;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>🔥 Messenger Bot Control Panel</h1>

    <!-- Start / Stop -->
    <form method="POST">
        <button name="action" value="start" class="start">▶ Start Bot</button>
        <button name="action" value="stop" class="stop">⏹ Stop Bot</button>
    </form>

    <!-- Status -->
    <div class="status">
        Status: {{ "🟢 Running" if status else "🔴 Stopped" }}
    </div>

    <!-- Logs -->
    <h2>📊 Live Logs</h2>
    <div id="logBox" class="log-box"></div>

</div>

<script>
function fetchLogs(){
    fetch("/logs")
    .then(res => res.json())
    .then(data => {
        let logBox = document.getElementById("logBox");
        logBox.innerHTML = data.join("<br>");
        logBox.scrollTop = logBox.scrollHeight;
    });
}

// हर 2 सेकंड में logs update
setInterval(fetchLogs, 2000);
</script>

</body>
</html>
